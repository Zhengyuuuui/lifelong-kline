<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>天时雷达</title>
    <link rel="stylesheet" href="/index.css">
    <style>
      :root {
        /* Brighter, Deep Midnight Blue for iOS 26 vibe instead of Pure Black */
        --cosmic-bg: #0f172a; 
      }

      * {
        -webkit-tap-highlight-color: transparent;
      }

      html {
        height: 100%;
        background-color: var(--cosmic-bg);
        scroll-behavior: smooth;
      }

      body {
        min-height: 100%;
        margin: 0;
        padding: 0;
        /* Allow native vertical scrolling with momentum */
        overflow-y: auto;
        overflow-x: hidden;
        background-color: var(--cosmic-bg);
        font-family: "SF Pro Display", -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", Arial, sans-serif;
        color: white;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        
        /* Enable panning and zooming gestures properly */
        touch-action: manipulation; 
        
        /* Optional: prevent pull-to-refresh if desired, but allow scrolling */
        overscroll-behavior-y: none;
        -webkit-overflow-scrolling: touch;
      }

      #root {
        min-height: 100%;
        position: relative;
      }

      /* Hide scrollbar for cleaner UI */
      ::-webkit-scrollbar {
        display: none;
      }
      
      /* Smooth scrolling class utility */
      .smooth-scroll {
        -webkit-overflow-scrolling: touch;
      }

      /* --- Premium Glass Utilities (iOS 26 Style) --- */
      
      /* Optimize heavy elements with GPU layers */
      .glass-panel-premium, .glass-card-sm, .glass-card-frost, .glass-pill-sm {
        transform: translateZ(0);
        will-change: transform, opacity;
      }
      
      /* Main Radar Panel - Luminous Holographic Glass */
      .glass-panel-premium {
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.08) 0%, rgba(255, 255, 255, 0.03) 100%);
        backdrop-filter: blur(50px);
        -webkit-backdrop-filter: blur(50px);
        border: 1px solid rgba(255, 255, 255, 0.12);
        box-shadow: 
          inset 0 0 0 1px rgba(255, 255, 255, 0.05),
          0 20px 40px -12px rgba(0, 0, 0, 0.6);
      }

      /* Smaller Glass Cards - Brighter for Readability */
      .glass-card-sm {
        background: rgba(255, 255, 255, 0.06);
        backdrop-filter: blur(30px);
        -webkit-backdrop-filter: blur(30px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 24px;
        transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      }
      /* Removed :active scale effect to allow text selection and prevent jitter */

      /* High Frost Glass (for Windows) */
      .glass-card-frost {
        background: rgba(40, 45, 60, 0.4);
        backdrop-filter: blur(40px);
        -webkit-backdrop-filter: blur(40px);
        border: 1px solid rgba(255, 255, 255, 0.12);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
      }

      /* Small Pills */
      .glass-pill-sm {
        background: rgba(30, 41, 59, 0.5);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 999px;
      }

      /* Animations */
      @keyframes spin-slow {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      .animate-spin-slow {
        animation: spin-slow 12s linear infinite;
      }

      @keyframes slide-up-fade {
        from { transform: translateY(20px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
      }
      .animate-slide-up-fade {
        animation: slide-up-fade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }

      @keyframes slide-down {
        from { opacity: 0; transform: translateY(-10px); height: 0; }
        to { opacity: 1; transform: translateY(0); height: auto; }
      }
      .animate-slide-down {
        animation: slide-down 0.3s ease-out forwards;
      }

      @keyframes fade-in {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      .animate-fade-in {
        animation: fade-in 0.4s ease-out forwards;
      }

      @keyframes slide-up-spring {
        from { transform: translateY(100%); }
        to { transform: translateY(0); }
      }
      .animate-slide-up-spring {
        animation: slide-up-spring 0.5s cubic-bezier(0.19, 1, 0.22, 1) forwards;
      }
      
      @keyframes scale-in {
        from { transform: scale(0.9); opacity: 0; }
        to { transform: scale(1); opacity: 1; }
      }
      .animate-scale-in {
        animation: scale-in 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }
      
      @keyframes pop-success {
        0% { transform: scale(1); }
        50% { transform: scale(1.2); }
        100% { transform: scale(1); }
      }
      .animate-pop-success {
        animation: pop-success 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
      }

      /* Typography */
      .font-mono-num {
        font-family: "SF Mono", "Menlo", "Monaco", "Courier New", monospace;
        font-variant-numeric: tabular-nums;
        letter-spacing: -0.5px;
      }
    </style>
	  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
